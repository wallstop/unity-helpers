<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200" style="background:transparent" role="img" aria-label="Unity Helpers — Stop writing boilerplate. Start shipping features. By Wallstop Studios">
  <title>Unity Helpers — Stop writing boilerplate. Start shipping features.</title>
  <defs>
    <!-- Warm-to-cool divider line: celebrates the breadth of capabilities -->
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0"/>
      <stop offset="12%" style="stop-color:#e94560"/>
      <stop offset="32%" style="stop-color:#f39c12"/>
      <stop offset="55%" style="stop-color:#00d9ff"/>
      <stop offset="82%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:0"/>
    </linearGradient>

    <!-- Warm hex/W gradient (Wallstop brand red-to-amber) -->
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>

    <!-- Title gradient: white through warm cream to cool cyan -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="45%" style="stop-color:#ffe9c4"/>
      <stop offset="100%" style="stop-color:#00d9ff"/>
    </linearGradient>

    <!-- Soft glow on the title -->
    <filter id="titleGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle drop shadow so light text reads on light backgrounds -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ============================================================== -->
  <!-- Hex-W shield (left, vertically centered)                        -->
  <!-- ============================================================== -->
  <g transform="translate(50, 100)" filter="url(#softShadow)">
    <!-- Outer hexagon outline -->
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5"
             fill="none" stroke="url(#hexGradient)" stroke-width="2.5" opacity="0.95"/>
    <!-- Inner hexagon tint -->
    <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16"
             fill="url(#hexGradient)" opacity="0.28"/>
    <!-- Single clean letterform W (path-rendered for font independence) -->
    <path d="M-15,-12 L-9,12 L0,-3 L9,12 L15,-12"
          fill="none" stroke="url(#hexGradient)" stroke-width="3.5"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- ============================================================== -->
  <!-- Title                                                            -->
  <!-- ============================================================== -->
  <text x="120" y="75"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="52" font-weight="700"
        fill="url(#titleGradient)" filter="url(#titleGlow)" letter-spacing="1"
        paint-order="stroke" stroke="#000000" stroke-width="2" stroke-opacity="0.32" stroke-linejoin="round">Unity Helpers</text>

  <!-- Tagline -->
  <text x="120" y="110"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="14" fill="#e8d5a8" letter-spacing="0.5"
        paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round">Stop writing boilerplate. Start shipping features.</text>

  <!-- Warm-to-cool divider -->
  <line x1="120" y1="124" x2="600" y2="124" stroke="url(#lineGradient)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- ============================================================== -->
  <!-- Capability icon row (inline emoji + label groups)               -->
  <!-- Six capabilities, custom offsets for equal optical label gaps   -->
  <!-- ============================================================== -->
  <g transform="translate(120, 150)"
     font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
     font-size="12" font-weight="600" letter-spacing="0.3">

    <!-- 🎨 Inspector -->
    <g transform="translate(0, 0)">
      <text x="0" y="15" font-size="14">🎨</text>
      <text x="20" y="13" fill="#e94560" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round">Inspector</text>
    </g>

    <!-- ✨ Effects -->
    <g transform="translate(90, 0)">
      <text x="0" y="15" font-size="14">✨️</text>
      <text x="20" y="13" fill="#00d9ff" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round">Effects</text>
    </g>

    <!-- 🔌 Auto-Wire -->
    <g transform="translate(168, 0)">
      <text x="0" y="15" font-size="14">🔌</text>
      <text x="20" y="13" fill="#f39c12" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round">Auto-Wire</text>
    </g>

    <!-- 🎲 PRNG -->
    <g transform="translate(262, 0)">
      <text x="0" y="15" font-size="14">🎲</text>
      <text x="20" y="13" fill="#2ecc71" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round">PRNG</text>
    </g>

    <!-- 🌳 Spatial -->
    <g transform="translate(332, 0)">
      <text x="0" y="15" font-size="14">🌳</text>
      <text x="20" y="13" fill="#f1c40f" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round">Spatial</text>
    </g>

    <!-- 🧰 Utilities -->
    <g transform="translate(406, 0)">
      <text x="0" y="15" font-size="14">🧰</text>
      <text x="20" y="13" fill="#9b59b6" paint-order="stroke" stroke="#000000" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round">Utilities</text>
    </g>
  </g>

  <!-- ============================================================== -->
  <!-- Right-side capability pill badges                               -->
  <!-- Dark fill, warm orange-bordered, warm-tinted text               -->
  <!-- ============================================================== -->
  <g transform="translate(632, 56)"
     font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
     font-size="11" font-weight="600" letter-spacing="0.3">

    <!-- Unity 2021.3+ -->
    <rect x="0" y="0" width="150" height="26" rx="13" ry="13" fill="#1a1a2e" opacity="0.88"/>
    <rect x="0" y="0" width="150" height="26" rx="13" ry="13"
          fill="none" stroke="#f39c12" stroke-width="1.4" opacity="0.85"/>
    <text x="75" y="17" text-anchor="middle" fill="#ffd9b5">🎮 Unity 2021.3+</text>

    <!-- 11,000+ tests -->
    <rect x="0" y="43" width="150" height="26" rx="13" ry="13" fill="#1a1a2e" opacity="0.88"/>
    <rect x="0" y="43" width="150" height="26" rx="13" ry="13"
          fill="none" stroke="#e94560" stroke-width="1.4" opacity="0.85"/>
    <text x="75" y="60" text-anchor="middle" fill="#ffd9b5">✅️ 11,000+ tests</text>

    <!-- Performant -->
    <rect x="0" y="86" width="150" height="26" rx="13" ry="13" fill="#1a1a2e" opacity="0.88"/>
    <rect x="0" y="86" width="150" height="26" rx="13" ry="13"
          fill="none" stroke="#2ecc71" stroke-width="1.4" opacity="0.85"/>
    <text x="75" y="103" text-anchor="middle" fill="#ffd9b5">⚡️ Performant</text>
  </g>

  <!-- ============================================================== -->
  <!-- Version pill (top-right, brand red accent)                      -->
  <!-- ============================================================== -->
  <g transform="translate(720, 18)">
    <rect x="0" y="0" width="62" height="22" rx="11" ry="11" fill="#e94560" opacity="0.95"/>
    <text x="31" y="15" text-anchor="middle"
          font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
          font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">v3.3.0</text>
  </g>

  <!-- ============================================================== -->
  <!-- Wallstop Studios attribution (bottom-right)                     -->
  <!-- ============================================================== -->
  <text x="782" y="192" text-anchor="end"
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="10" fill="#9aa3b8" letter-spacing="0.6"
        paint-order="stroke" stroke="#000000" stroke-width="2" stroke-opacity="0.7" stroke-linejoin="round">Wallstop Studios</text>
</svg>
