name: Validate Dev Container

on:
  push:
    branches:
      - main
    paths:
      - ".devcontainer/**"
      - "scripts/validate-devcontainer-config.ps1"
      - "scripts/validate-devcontainer-urls.sh"
      - "scripts/tests/test-post-create.sh"
      - ".github/workflows/validate-devcontainer.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - "scripts/validate-devcontainer-config.ps1"
      - "scripts/validate-devcontainer-urls.sh"
      - "scripts/tests/test-post-create.sh"
      - ".github/workflows/validate-devcontainer.yml"

permissions:
  contents: read

jobs:
  validate-devcontainer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate devcontainer config
        shell: pwsh
        run: ./scripts/validate-devcontainer-config.ps1 -VerboseOutput

      - name: Validate Dockerfile download URLs
        run: ./scripts/validate-devcontainer-urls.sh

      - name: Validate post-create script
        run: ./scripts/tests/test-post-create.sh --verbose
