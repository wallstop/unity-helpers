name: C# Naming Convention Lint

on:
  push:
    branches:
      - main
    paths:
      - "**.cs"
      - "scripts/comment-stripping.ps1"
      - "scripts/lint-csharp-naming.ps1"
      - "scripts/tests/test-comment-stripping.ps1"
      - "scripts/tests/test-lint-csharp-naming.ps1"
      - ".github/workflows/csharp-naming-lint.yml"
  pull_request:
    paths:
      - "**.cs"
      - "scripts/comment-stripping.ps1"
      - "scripts/lint-csharp-naming.ps1"
      - "scripts/tests/test-comment-stripping.ps1"
      - "scripts/tests/test-lint-csharp-naming.ps1"
      - ".github/workflows/csharp-naming-lint.yml"

permissions:
  contents: read

jobs:
  lint-csharp-naming:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test comment-stripping helper
        shell: pwsh
        run: ./scripts/tests/test-comment-stripping.ps1 -VerboseOutput

      - name: Test C# naming linter
        shell: pwsh
        run: ./scripts/tests/test-lint-csharp-naming.ps1 -VerboseOutput

      - name: Lint C# method names (no underscores)
        shell: pwsh
        run: ./scripts/lint-csharp-naming.ps1 -VerboseOutput
