name: Odin Undo Safety Lint

on:
  push:
    branches:
      - main
    paths:
      - "**.cs"
      - "scripts/lint-odin-undo-safety.ps1"
      - "scripts/tests/test-lint-odin-undo-safety.ps1"
      - ".github/workflows/odin-undo-safety-lint.yml"
  pull_request:
    paths:
      - "**.cs"
      - "scripts/lint-odin-undo-safety.ps1"
      - "scripts/tests/test-lint-odin-undo-safety.ps1"
      - ".github/workflows/odin-undo-safety-lint.yml"

permissions:
  contents: read

jobs:
  lint-odin-undo-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Test odin undo safety linter
        shell: pwsh
        run: ./scripts/tests/test-lint-odin-undo-safety.ps1 -VerboseOutput

      - name: Lint odin undo safety
        shell: pwsh
        run: ./scripts/lint-odin-undo-safety.ps1 -VerboseOutput
