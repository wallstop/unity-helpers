name: License Year Audit

on:
  push:
    branches:
      - main
    paths:
      - "LICENSE"
      - "**.cs"
      - "scripts/audit-license-years.sh"
      - ".github/workflows/license-year-audit.yml"
  pull_request:
    paths:
      - "LICENSE"
      - "**.cs"
      - "scripts/audit-license-years.sh"
      - ".github/workflows/license-year-audit.yml"

permissions:
  contents: read

jobs:
  audit-license-years:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Audit license years
        run: bash scripts/audit-license-years.sh --summary
