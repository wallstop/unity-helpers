name: Spelling Check

on:
  push:
    # Run on every branch so --no-verify feature-branch pushes still get spell-checked
    # even if they never open a PR. Paths-scoping keeps runs cheap.
    paths:
      - "docs/**/*.md"
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".llm/**/*.md"
      - ".github/**/*.md"
      - "Runtime/**/*.cs"
      - "Editor/**/*.cs"
      - "Tests/**/*.cs"
      - "scripts/add-cspell-word.js"
      - "scripts/tests/test-add-cspell-word.js"
      - "cspell.json"
      - "package.json"
      - ".github/workflows/spelling-check.yml"
  pull_request:
    paths:
      - "docs/**/*.md"
      - "README.md"
      - "CHANGELOG.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".llm/**/*.md"
      - ".github/**/*.md"
      - "Runtime/**/*.cs"
      - "Editor/**/*.cs"
      - "Tests/**/*.cs"
      - "scripts/add-cspell-word.js"
      - "scripts/tests/test-add-cspell-word.js"
      - "cspell.json"
      - "package.json"
      - ".github/workflows/spelling-check.yml"

permissions:
  contents: read

jobs:
  spelling:
    name: Check Spelling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Test cspell word helper
        run: node scripts/tests/test-add-cspell-word.js

      - name: Run spell check
        id: spellcheck
        run: |
          echo "🔍 Running spell check on documentation and code comments..."

          # Run cspell and capture output
          set +e
          OUTPUT=$(npm run lint:spelling 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"

          # Count misspellings
          MISSPELLING_COUNT=$(echo "$OUTPUT" | grep -c "Unknown word" || true)

          if [ "$EXIT_CODE" -ne 0 ] || [ "$MISSPELLING_COUNT" -gt 0 ]; then
            echo ""
            echo "❌ Spelling check failed with $MISSPELLING_COUNT issues"
            echo ""
            echo "To fix spelling issues:"
            echo "1. Correct the misspelled words in your documentation"
            echo "2. If a word is a valid technical term, add it to cspell.json"
            echo ""
            echo "To add a word to the dictionary, edit cspell.json and add it to the appropriate dictionary:"
            echo "- unity-terms: Unity API names (MonoBehaviour, ScriptableObject, etc.)"
            echo "- csharp-terms: C# language features (async, ValueTask, etc.)"
            echo "- package-terms: Package-specific terms (WGroup, SerializableDictionary, etc.)"
            echo "- tech-terms: Technical/industry terms (IL2CPP, PRNG, etc.)"
            echo "- words: General words not fitting other categories"
            exit 1
          fi

          echo "✅ No spelling issues found"

      - name: Generate Summary
        if: always()
        run: |
          # Re-run to get output for summary
          set +e
          OUTPUT=$(npm run lint:spelling 2>&1)
          MISSPELLING_COUNT=$(echo "$OUTPUT" | grep -c "Unknown word" || true)
          set -e

          {
            echo "## 📝 Spelling Check Results"
            echo ""
            if [ "$MISSPELLING_COUNT" -gt 0 ]; then
              echo "❌ **Found $MISSPELLING_COUNT spelling issues**"
              echo ""
              echo "### Issues Found:"
              echo "\`\`\`"
              echo "$OUTPUT" | grep "Unknown word" | head -20
              if [ "$MISSPELLING_COUNT" -gt 20 ]; then
                echo "... and $((MISSPELLING_COUNT - 20)) more"
              fi
              echo "\`\`\`"
            else
              echo "✅ **No spelling issues found**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
