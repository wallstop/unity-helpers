name: Lint Error Codes Contract

# CI backstop for the cspell lint-error-code contract.
#
# This workflow is the LAST line of defense for the PWS001/PWS002 class of
# regression: a new lint-error-code family ships without a cspell entry, the
# pre-commit hook catches it locally, but CI must also block merge if a
# developer bypasses hooks with --no-verify or if a merge-commit path (see
# .githooks/pre-merge-commit) is skipped via fast-forward/squash/rebase.
#
# What this enforces:
#   1. scripts/validate-lint-error-codes.ps1 passes: every [A-Z]{2,}\d{3}
#      prefix emitted by any scripts/lint-*.{ps1,js}, scripts/tests/test-lint-
#      *.{ps1,js,sh}, or .githooks/* file roundtrips through cspell cleanly.
#   2. The validator's own test suite passes: harvester logic, upstream-rule
#      allowlist, and failure modes all behave as documented.
#
# Bypass paths it closes:
#   - git commit --no-verify / git push --no-verify
#   - fast-forward merge (pre-merge-commit does not fire)
#   - git merge --squash (no merge commit is created)
#   - cherry-pick / rebase (all hooks bypassed)
# In every one of the above, CI is the final enforcement point.

on:
  push:
    branches:
      - main
    paths:
      - "scripts/lint-*.ps1"
      - "scripts/lint-*.js"
      - "scripts/tests/test-lint-*.ps1"
      - "scripts/tests/test-lint-*.js"
      - "scripts/tests/test-lint-*.sh"
      - ".githooks/**"
      - "scripts/validate-lint-error-codes.ps1"
      - "scripts/tests/test-validate-lint-error-codes.ps1"
      - "cspell.json"
      - ".github/workflows/lint-error-codes.yml"
  pull_request:
    paths:
      - "scripts/lint-*.ps1"
      - "scripts/lint-*.js"
      - "scripts/tests/test-lint-*.ps1"
      - "scripts/tests/test-lint-*.js"
      - "scripts/tests/test-lint-*.sh"
      - ".githooks/**"
      - "scripts/validate-lint-error-codes.ps1"
      - "scripts/tests/test-validate-lint-error-codes.ps1"
      - "cspell.json"
      - ".github/workflows/lint-error-codes.yml"
  workflow_dispatch:

permissions:
  contents: read

# A single in-flight run per ref is enough; cancel superseded ones so PR
# updates don't stack. Matches the pattern in other repo workflows.
concurrency:
  group: lint-error-codes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-error-codes:
    name: Lint Error Codes Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Install dependencies
        # npm ci requires a lockfile; fall back to npm i for consistency with
        # spelling-check.yml (the canonical npm-install step in this repo).
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i --no-audit --no-fund
          fi

      - name: Validate lint-error-code cspell coverage
        shell: pwsh
        run: npm run validate:lint-error-codes

      - name: Run lint-error-code validator test suite
        shell: pwsh
        run: npm run test:validate-lint-error-codes
